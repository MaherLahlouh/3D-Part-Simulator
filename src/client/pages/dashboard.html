<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TAA Simulator</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link href="../css/dashboard.css" rel="stylesheet">
</head>
<body>
    <!-- Main Content -->
    <main class="dashboard-container">
        <div class="dashboard-content">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo">
                    <svg width="80" height="80" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect width="100" height="100" rx="22" fill="url(#logoGradient)"/>
                        <text x="50" y="68" font-size="48" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold">T</text>
                    </svg>
                </div>
                <h1 class="app-title">TAA Simulator</h1>
                <p class="app-subtitle">Welcome to the TAA Simulator Dashboard</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn btn-primary" id="loginBtn">
                    <span class="btn-icon">🔐</span>
                    <span class="btn-text">Login</span>
                </button>
                <button class="btn btn-secondary" id="signupBtn">
                    <span class="btn-icon">📝</span>
                    <span class="btn-text">Sign Up</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="../scripts/dashboard.ts"></script>
</body>
</html>
