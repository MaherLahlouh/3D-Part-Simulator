<!DOCTYPE html>
<html lang="en">

<head>
  <script type="module">
    if (localStorage.getItem('token')) {
      window.location.href = '/src/client/pages/landing.html';
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAA Simulator - Sign Up</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Local CSS - Fixed Path -->
  <link rel="stylesheet" href="../css/signup_design.css">
  <!-- Firebase SDKs -->
  <!-- <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script> -->
</head>

<body>
  <div class="auth-container">
    <div class="logo">🚀</div>
    <h2>Create Account</h2>
    <p class="subtitle">Join TAA Simulator and start building</p>

    <form id="signup-form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <div class="input-wrapper">
            <input type="text" id="firstName" name="firstName" placeholder="First name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <div class="input-wrapper">
            <input type="text" id="lastName" name="lastName" placeholder="Last name" required>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Create a password" required minlength="6">
          <span class="toggle-password" onclick="toggleVisibility('password')">👁️</span>
        </div>
        <div class="password-strength" id="passwordStrength"></div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm-password" placeholder="Confirm your password" required>
          <span class="toggle-password" onclick="toggleVisibility('confirm-password')">👁️</span>
        </div>
        <div class="password-match" id="passwordMatch"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="institution">Institution</label>
          <div class="input-wrapper">
            <input type="text" id="institution" name="institution" placeholder="School/Organization" required>
          </div>
        </div>

        <div class="form-group">
          <label for="country">Country</label>
          <div class="input-wrapper">
            <input type="text" id="country" name="country" placeholder="Country" required>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <div class="input-wrapper">
          <select id="role" name="role" required>
            <option value="">Select your role</option>
            <option value="user">User</option>
            <option value="teacher">Teacher</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Phone Number</label>
        <div class="input-wrapper">
          <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Phone number" required>
        </div>
      </div>

      <button type="submit">Create Account</button>
    </form>

    <div class="auth-links">
      <!-- FIXED: Corrected path to login.html -->
      <p>Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>

  <!-- Local JS Files - Fixed Paths -->
  <script type="module" src="../scripts/signup-handler.ts"></script>
</body>

</html>
